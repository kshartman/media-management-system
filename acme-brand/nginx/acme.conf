# ACME Media Library — nginx reverse-proxy (EXAMPLE)
#
# This configuration covers two common setups:
#   A) Direct SSL with Let's Encrypt (certbot)
#   B) Behind Cloudflare proxy with Full (Strict) SSL
#
# Uncomment the section that matches your deployment.
# Adjust server_name, certificate paths, and upstream ports as needed.


# ─── Option A: Direct SSL (Let's Encrypt / certbot) ─────────────────────

server {
    listen 80;
    server_name media.acmecorp.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name media.acmecorp.example.com;

    # Let's Encrypt certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/media.acmecorp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/media.acmecorp.example.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Frontend (Next.js on port 5000 → container 3000) ──────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ── Backend API (Express on port 5001) ────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads — adjust if you allow larger media
        client_max_body_size 50m;
    }

    # ── Health / debug endpoints — restrict to localhost ──────────────
    location = /api/health {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:5001;
    }

    location = /api/client-error {
        # Allow from the frontend only (same origin)
        proxy_pass http://127.0.0.1:5001;
    }
}


# ─── Option B: Behind Cloudflare (Full Strict SSL) ──────────────────────
#
# When Cloudflare terminates the public TLS connection and re-encrypts to
# your origin, use a Cloudflare Origin Certificate instead of Let's Encrypt.
