version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://marketing.shopzive.com/api}
        NEXT_PUBLIC_DOMAIN: ${DOMAIN:-marketing.shopzive.com}
    image: media-management-frontend:latest
    container_name: media-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:5001
    ports:
      - "5000:3000"
    depends_on:
      - backend
    networks:
      - media-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: media-management-backend:latest
    container_name: media-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET}
      - UPLOAD_PATH=/uploads
      - DOMAIN=${DOMAIN:-marketing.shopzive.com}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL:-warn}
    volumes:
      - ${HOST_UPLOAD_PATH:-./uploads}:/uploads
    ports:
      - "5001:5001"
    networks:
      - media-network

networks:
  media-network:
    driver: bridge