version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: media-management-frontend:latest
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://marketing.shopzive.com/api}
      - NEXT_PUBLIC_DOMAIN=${DOMAIN:-marketing.shopzive.com}
    ports:
      - "3000:3000"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: media-management-backend:latest
    environment:
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - UPLOAD_PATH=/uploads
      - DOMAIN=${DOMAIN:-marketing.shopzive.com}
    volumes:
      - ${UPLOAD_PATH:-./uploads}:/uploads
    ports:
      - "5001:5001"