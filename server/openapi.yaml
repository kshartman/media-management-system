openapi: 3.0.3
info:
  title: Media Management System API
  description: |
    Backend API for a comprehensive media management system supporting images, social media content, and video reels.
    
    ## Features
    - Card management (image, social, reel types)
    - File uploads with automatic processing
    - User authentication and management
    - Password reset via email (SendGrid or Mailgun)
    - Tag management
    - Health monitoring with dependency checks
    - Both local and S3 storage support
    - Soft delete system with trash management (admin/editor only)
    - Centralized error handling with correlation ID tracking
    - Database connection pooling with retry logic
    - Environment validation on startup
    - Secure system initialization with setup endpoint
    
    ## Architecture Improvements
    - **Correlation IDs**: All responses include `X-Correlation-ID` header for request tracking
    - **Centralized Error Handling**: Consistent error responses with correlation IDs and timestamps
    - **Enhanced Health Checks**: Comprehensive monitoring of database, storage, email, and system resources
    - **Database Resilience**: Connection pooling, retry logic with exponential backoff
    - **Structured Logging**: Correlation ID tracking throughout the request lifecycle
    - **Environment Validation**: Startup validation of all environment variables
    
    ## Authentication
    The API uses secure httpOnly cookies for authentication. JWT tokens are automatically managed by the browser and included in requests via cookies.
    
    ## File Upload
    File uploads use multipart/form-data and support up to 500MB files with automatic preview generation.
    
    ## Email Configuration
    The system supports multiple email providers for sending password reset and welcome emails:
    - SendGrid (default if both configured)
    - Mailgun
    
    Configure via environment variables or force a specific driver with MAIL_DRIVER=sendgrid|mailgun
  version: 1.0.0
  contact:
    name: Media Management System
  license:
    name: MIT

servers:
  - url: http://localhost:5001
    description: Development server
  - url: https://resources.shopzive.com
    description: Production server

paths:
  # Health Check Endpoints
  /health:
    get:
      tags:
        - Health
      summary: Simple liveness check
      description: Basic health check endpoint for container liveness probes
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'

  /api/health:
    get:
      tags:
        - Health
      summary: Comprehensive health check
      description: Detailed health status including database, storage, and system metrics
      responses:
        '200':
          description: Health check results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/health/ready:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Kubernetes-style readiness probe
      responses:
        '200':
          description: Service ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  # Authentication Setup
  /api/auth/setup:
    post:
      tags:
        - Authentication
      summary: Initial system setup
      description: |
        Create the first admin user for system initialization.
        This endpoint is only available when no users exist in the database.
        **Security**: Strictly rate-limited and only works on fresh installations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '201':
          description: First admin user created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupResponse'
        '400':
          description: Invalid request data or password requirements not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Setup not available - users already exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Validate session and return current user information
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Clear authentication cookie and end session
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  # Debug Endpoints
  /api/debug/loglevel:
    get:
      tags:
        - Debug
      summary: Get current log level
      description: |
        Returns the current log level setting. 
        
        **Note:** This endpoint is restricted to internal networks only via nginx configuration.
      responses:
        '200':
          description: Current log level retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogLevelResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Debug
      summary: Set log level dynamically
      description: |
        Dynamically change the log level without restarting the container.
        Valid levels are: error, warn, info, debug.
        
        **Note:** This endpoint is restricted to internal networks only via nginx configuration.
        
        **Example usage:**
        ```bash
        curl -X POST https://resources.shopzive.com/api/debug/loglevel \
          -H "Content-Type: application/json" \
          -d '{"logLevel": "debug"}'
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLogLevelRequest'
      responses:
        '200':
          description: Log level changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetLogLevelResponse'
        '400':
          description: Invalid log level provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Authentication Endpoints
  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user with username or email and password, receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email to user (requires email service configuration - SendGrid or Mailgun)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent (if email service configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request or email service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset user password using token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Card Management Endpoints
  /api/cards:
    get:
      tags:
        - Cards
      summary: Get cards with pagination and filtering
      description: Retrieve cards with optional search, type filtering, and tag filtering
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page (default 12)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
        - name: search
          in: query
          description: Search term for description
          schema:
            type: string
        - name: type
          in: query
          description: Filter by card type
          schema:
            oneOf:
              - type: string
                enum: [image, social, reel]
              - type: array
                items:
                  type: string
                  enum: [image, social, reel]
        - name: tag
          in: query
          description: Filter by tags
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
        - name: sort
          in: query
          description: Sort order for results
          schema:
            type: string
            enum: [newest, oldest, alphabetical, popularity]
            default: newest
        - name: includeDeleted
          in: query
          description: Include soft-deleted cards in results (admin/editor only)
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Cards retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardsResponse'

    post:
      tags:
        - Cards
      summary: Create new card
      description: Create a new card with file uploads
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateCardRequest'
      responses:
        '201':
          description: Card created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/{id}:
    get:
      tags:
        - Cards
      summary: Get card by ID
      description: Retrieve a single card by its ID
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: Card retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Cards
      summary: Update card
      description: Update an existing card with optional file uploads
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateCardRequest'
      responses:
        '200':
          description: Card updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Cards
      summary: Soft delete card
      description: |
        Soft delete a card (move to trash). The card will be marked as deleted but not permanently removed.
        For already deleted cards, this will perform permanent deletion.
        Admin/editor users can view deleted cards by using the includeDeleted parameter in GET requests.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '204':
          description: Card moved to trash (soft deleted) or permanently deleted
        '400':
          description: Card is already deleted (when trying to soft delete)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/{id}/social-copy:
    patch:
      tags:
        - Cards
      summary: Update social copy
      description: Update Instagram and Facebook copy for social or reel cards
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialCopyRequest'
      responses:
        '200':
          description: Social copy updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '400':
          description: Invalid request or not a social/reel card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/{id}/generate-fallback-preview:
    patch:
      tags:
        - Cards
      summary: Generate fallback preview
      description: Generate a fallback preview image for reel cards when automatic preview generation fails
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: Fallback preview generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '400':
          description: Invalid request or not a reel card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/{id}/track-download:
    post:
      tags:
        - Cards
      summary: Track card download
      description: Increment the download count for a card when a file is downloaded
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: Download tracked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  downloadCount:
                    type: integer
                    description: Updated download count
                    example: 42
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Trash Management Endpoints
  /api/cards/trash/{id}/restore:
    post:
      tags:
        - Cards
        - Trash
      summary: Restore card from trash
      description: Restore a soft-deleted card back to active status (admin/editor only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '204':
          description: Card restored successfully
        '400':
          description: Card is not deleted or already active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin or editor access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/trash/{id}/permanent:
    delete:
      tags:
        - Cards
        - Trash
      summary: Permanently delete card
      description: |
        Permanently delete a soft-deleted card and all associated files.
        This action cannot be undone. Only works on cards that are already soft-deleted.
        (admin/editor only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '204':
          description: Card permanently deleted
        '400':
          description: Card is not in trash or already active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin or editor access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cards/{id}/download-package:
    get:
      tags:
        - Files
      summary: Create download package
      description: Create a ZIP package containing all files for a card
      parameters:
        - name: id
          in: path
          required: true
          description: Card ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: Download URL created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadPackageResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/download-zip/{filename}:
    get:
      tags:
        - Files
      summary: Download ZIP package
      description: Download a previously created ZIP package
      parameters:
        - name: filename
          in: path
          required: true
          description: ZIP filename
          schema:
            type: string
      responses:
        '200':
          description: ZIP file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/files/signed-url:
    post:
      tags:
        - Files
      summary: Generate signed URL
      description: Generate a signed URL for S3 files (only works when S3 is configured)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignedUrlRequest'
      responses:
        '200':
          description: Signed URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedUrlResponse'
        '400':
          description: Invalid URL or S3 not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Tag Management
  /api/tags:
    get:
      tags:
        - Tags
      summary: Get all tags
      description: Retrieve all available tags
      responses:
        '200':
          description: Tags retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["marketing", "social", "campaign"]

  # User Management (Admin Only)
  /api/users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve all users (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Users
      summary: Create user
      description: Create a new user account (admin only, sends welcome email if configured)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/User'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Welcome email sent successfully"
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve a single user by ID (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Users
      summary: Update user
      description: Update user account (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete user account (admin only, cannot delete last admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '204':
          description: User deleted successfully
        '400':
          description: Cannot delete last admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}/send-reset-link:
    post:
      tags:
        - Users
      summary: Send password reset link
      description: Send a password reset link to a user (admin only, 24-hour expiration)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            pattern: '^[0-9a-fA-F]{24}$'
      responses:
        '200':
          description: Password reset link sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendResetLinkResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to send email or email service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Email service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/auth/login

  schemas:
    # Health Schemas
    LivenessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [alive]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          description: Server uptime in seconds
        correlationId:
          type: string
          format: uuid
          description: Unique request correlation ID for tracking

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        version:
          type: string
        environment:
          type: string
        responseTime:
          type: string
        correlationId:
          type: string
          format: uuid
          description: Unique request correlation ID for tracking
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                responseTime:
                  type: string
                database:
                  type: string
                host:
                  type: string
                port:
                  type: number
                collections:
                  type: number
                dataSize:
                  type: string
                connectionPool:
                  type: object
                  description: Database connection pool status
                  properties:
                    status:
                      type: string
                      enum: [connected, disconnected]
                    poolSize:
                      type: number
                      description: Maximum connections in pool
                    models:
                      type: number
                      description: Number of registered models
            storage:
              type: object
              properties:
                s3:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [healthy, unhealthy, not-configured]
                    responseTime:
                      type: string
                    bucket:
                      type: string
                    region:
                      type: string
                local:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [healthy, unhealthy]
                    responseTime:
                      type: string
                    path:
                      type: string
                    fileCount:
                      type: number
                    accessible:
                      type: boolean
                    writable:
                      type: boolean
            email:
              type: object
              properties:
                status:
                  type: string
                  enum: [configured, not-configured, error]
                provider:
                  type: string
                  nullable: true
                  description: Current mail driver (sendgrid, mailgun)
                initialized:
                  type: boolean
                  description: Whether the mail service is initialized
                availableDrivers:
                  type: array
                  items:
                    type: string
                  description: List of supported mail drivers
                driverStatus:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      available:
                        type: boolean
                      required_vars:
                        type: array
                        items:
                          type: string
                features:
                  type: array
                  items:
                    type: string
            system:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, warning]
                memory:
                  type: object
                  properties:
                    heapUsed:
                      type: number
                    heapTotal:
                      type: number
                    external:
                      type: number
                    unit:
                      type: string
                    percentage:
                      type: number
                uptime:
                  type: number
                pid:
                  type: number
                nodeVersion:
                  type: string
                platform:
                  type: string
            dependencies:
              type: object
              properties:
                ffmpeg:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [available, unavailable]
                    path:
                      type: string
                chromium:
                  type: object
                  properties:
                    status:
                      type: string
                      enum: [available, unavailable]
                    executablePath:
                      type: string

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not-ready]
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          nullable: true
        correlationId:
          type: string
          format: uuid
          description: Unique request correlation ID for tracking

    # Debug Schemas
    LogLevelResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        logLevel:
          type: string
          enum: [error, warn, info, debug]
          description: Current log level
          example: "warn"
        validLevels:
          type: array
          items:
            type: string
            enum: [error, warn, info, debug]
          description: All valid log levels
          example: ["error", "warn", "info", "debug"]

    SetLogLevelRequest:
      type: object
      required:
        - logLevel
      properties:
        logLevel:
          type: string
          enum: [error, warn, info, debug]
          description: New log level to set
          example: "debug"

    SetLogLevelResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        previousLevel:
          type: string
          enum: [error, warn, info, debug]
          description: Previous log level
          example: "warn"
        newLevel:
          type: string
          enum: [error, warn, info, debug]
          description: New log level
          example: "debug"
        message:
          type: string
          description: Success message
          example: "Log level successfully changed to 'debug'"

    # Authentication Schemas
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: "Username or email address"
          example: "admin"
        password:
          type: string
          format: password
          example: "password123"

    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: "admin@example.com"

    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: Reset token from email
          example: "abc123def456"
        newPassword:
          type: string
          format: password
          minLength: 12
          description: Must be at least 12 characters with uppercase, lowercase, numbers, and special characters
          example: "NewPassword123!"

    SetupRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
          description: Username for the first admin user
          example: "admin"
        email:
          type: string
          format: email
          description: Email for the first admin user
          example: "admin@example.com"
        password:
          type: string
          format: password
          minLength: 12
          description: Strong password with uppercase, lowercase, numbers, and special characters
          example: "SecurePassword123!"

    SetupResponse:
      type: object
      properties:
        message:
          type: string
          example: "Admin user created successfully"
        user:
          $ref: '#/components/schemas/User'

    # Card Schemas
    Card:
      type: object
      properties:
        _id:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: "507f1f77bcf86cd799439011"
        type:
          type: string
          enum: [image, social, reel]
          example: "social"
        description:
          type: string
          example: "Summer campaign carousel"
        tags:
          type: array
          items:
            type: string
          example: ["marketing", "summer", "carousel"]
        preview:
          type: string
          nullable: true
          description: URL to preview image
          example: "https://example.com/uploads/preview_123.jpg"
        download:
          type: string
          nullable: true
          description: URL to downloadable file (required for image cards)
          example: "https://example.com/uploads/download_123.jpg"
        imageSequence:
          type: array
          items:
            type: string
          description: Array of image URLs (required for social cards)
          example: ["https://example.com/uploads/img1.jpg", "https://example.com/uploads/img2.jpg"]
        movie:
          type: string
          nullable: true
          description: URL to video file (required for reel cards)
          example: "https://example.com/uploads/video_123.mp4"
        transcript:
          type: string
          nullable: true
          description: URL to transcript file
          example: "https://example.com/uploads/transcript_123.txt"
        instagramCopy:
          type: string
          nullable: true
          description: Instagram post copy
          example: "Check out our summer collection! #summer #fashion"
        facebookCopy:
          type: string
          nullable: true
          description: Facebook post copy
          example: "Discover amazing summer styles at our store!"
        fileMetadata:
          $ref: '#/components/schemas/FileMetadata'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        downloadCount:
          type: integer
          minimum: 0
          default: 0
          description: Number of times this card has been downloaded
          example: 42
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the card was soft deleted (null if not deleted)
          example: "2024-01-15T14:30:00.000Z"
        deletedBy:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          nullable: true
          description: ID of the user who deleted the card (null if not deleted)
          example: "507f1f77bcf86cd799439011"

    FileMetadata:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: Content creation date
        width:
          type: number
          nullable: true
          description: Width in pixels
        height:
          type: number
          nullable: true
          description: Height in pixels
        fileSize:
          type: number
          nullable: true
          description: File size in bytes
        totalSequenceSize:
          type: number
          nullable: true
          description: Total size of image sequence
        imageSequenceCount:
          type: number
          nullable: true
          description: Number of images in sequence
        originalFileName:
          type: string
          nullable: true
        previewOriginalFileName:
          type: string
          nullable: true
        downloadOriginalFileName:
          type: string
          nullable: true
        movieOriginalFileName:
          type: string
          nullable: true
        transcriptOriginalFileName:
          type: string
          nullable: true
        instagramCopyOriginalFileName:
          type: string
          nullable: true
        facebookCopyOriginalFileName:
          type: string
          nullable: true
        imageSequenceOriginalFileNames:
          type: array
          items:
            type: string
        imageSequenceFileSizes:
          type: array
          items:
            type: number

    CardsResponse:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'
        totalCount:
          type: number
          description: Total number of cards matching filters
          example: 156
        availableTags:
          type: array
          items:
            type: string
          description: All available tags in the system
          example: ["marketing", "social", "campaign", "summer"]

    CreateCardRequest:
      type: object
      required:
        - type
        - description
      properties:
        type:
          type: string
          enum: [image, social, reel]
          description: Type of card to create
        description:
          type: string
          description: Card description
        tags:
          type: string
          description: Comma-separated list of tags
          example: "marketing,summer,campaign"
        date:
          type: string
          format: date-time
          description: Content creation date (optional)
        instagramCopy:
          type: string
          description: Instagram post copy (for social/reel cards)
        facebookCopy:
          type: string
          description: Facebook post copy (for social/reel cards)
        imageSequenceCount:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of images in sequence (for social cards)
        preview:
          type: string
          format: binary
          description: Preview image file (optional)
        download:
          type: string
          format: binary
          description: Downloadable file (required for image cards)
        movie:
          type: string
          format: binary
          description: Video file (required for reel cards)
        transcript:
          type: string
          format: binary
          description: Transcript file (optional)
        documentCopy:
          type: string
          format: binary
          description: Document copy file (optional for social cards)
        # Dynamic fields for image sequence
        imageSequence_0:
          type: string
          format: binary
          description: First image in sequence
        imageSequence_1:
          type: string
          format: binary
          description: Second image in sequence
        # ... up to imageSequence_49

    UpdateCardRequest:
      allOf:
        - $ref: '#/components/schemas/CreateCardRequest'
        - type: object
          properties:
            remove_preview:
              type: string
              enum: [true]
              description: Set to 'true' to remove preview image
            remove_download:
              type: string
              enum: [true]
              description: Set to 'true' to remove download file
            remove_movie:
              type: string
              enum: [true]
              description: Set to 'true' to remove movie file
            remove_transcript:
              type: string
              enum: [true]
              description: Set to 'true' to remove transcript file
            generatePreview:
              type: string
              enum: [true]
              description: Set to 'true' to regenerate preview from video (reel cards)

    SocialCopyRequest:
      type: object
      properties:
        instagramCopy:
          type: string
          description: Instagram post copy
        facebookCopy:
          type: string
          description: Facebook post copy

    # File Schemas
    DownloadPackageResponse:
      type: object
      properties:
        downloadUrl:
          type: string
          description: URL to download ZIP package
          example: "/api/download-zip/card_123_files.zip"

    SignedUrlRequest:
      type: object
      required:
        - fileUrl
      properties:
        fileUrl:
          type: string
          format: uri
          description: S3 file URL to generate signed URL for
          example: "https://bucket.s3.amazonaws.com/uploads/file.jpg"

    SignedUrlResponse:
      type: object
      properties:
        signedUrl:
          type: string
          format: uri
          description: Temporary signed URL for file access
          example: "https://bucket.s3.amazonaws.com/uploads/file.jpg?X-Amz-Signature=..."

    # User Schemas
    User:
      type: object
      properties:
        _id:
          type: string
          pattern: '^[0-9a-fA-F]{24}$'
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          example: "admin"
        email:
          type: string
          format: email
          example: "admin@example.com"
        role:
          type: string
          enum: [admin, editor]
          example: "admin"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of the user's last successful login"
          example: "2024-01-15T14:30:00.000Z"

    CreateUserRequest:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
          minLength: 1
          example: "newuser"
        email:
          type: string
          format: email
          example: "newuser@example.com"
        role:
          type: string
          enum: [admin, editor]
          default: editor
          example: "editor"

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          example: "updateduser"
        email:
          type: string
          format: email
          example: "updated@example.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "newpassword123"
        role:
          type: string
          enum: [admin, editor]
          example: "admin"

    SendResetLinkResponse:
      type: object
      properties:
        message:
          type: string
          example: "Password reset link has been sent successfully"
        email:
          type: string
          format: email
          description: Email address where the reset link was sent
          example: "user@example.com"
        expiresAt:
          type: string
          format: date-time
          description: When the reset link expires (24 hours from creation)
          example: "2024-01-15T14:30:00.000Z"


    # Common Schemas
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Invalid request parameters"
        details:
          type: string
          description: Additional error details
          example: "Username is required"
        correlationId:
          type: string
          format: uuid
          description: Unique request correlation ID for tracking
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
        path:
          type: string
          description: Request path where error occurred
        method:
          type: string
          description: HTTP method where error occurred

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Debug
    description: Debug and diagnostics endpoints (restricted to internal networks)
  - name: Authentication
    description: User authentication and password management
  - name: Cards
    description: Media card management (images, social content, reels)
  - name: Files
    description: File operations and downloads
  - name: Tags
    description: Tag management
  - name: Users
    description: User account management (admin only)
  - name: Trash
    description: Soft delete and trash management (admin/editor only)