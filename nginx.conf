# Super Patch Media Library — nginx configuration
# SSL terminated by Cloudflare (Flexible or Full mode)
#
# Cloudflare handles:
#   - SSL certificate provisioning and renewal
#   - DDoS protection
#   - CDN caching
#
# This server receives traffic from Cloudflare over HTTP (Flexible)
# or HTTPS with Cloudflare Origin Certificate (Full/Strict)

# --- Option A: Cloudflare Flexible SSL (HTTP from Cloudflare → nginx) ---
# Use this if Cloudflare SSL mode is set to "Flexible"

server {
    listen 80;
    server_name affiliate-resources.superpatch.com;

    # Frontend
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # File upload size limit
        client_max_body_size 100M;
    }
}

