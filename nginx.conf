# Super Patch Media Library — nginx configuration
#
# Production: affiliate-resources.superpatch.com (Cloudflare Full Strict)
#
# Cloudflare handles:
#   - Edge SSL certificate (visitor ↔ Cloudflare)
#   - DDoS protection, CDN caching, Bot Fight Mode
#
# Origin certificate handles:
#   - Encrypted connection between Cloudflare and this server
#   - Cloudflare SSL mode MUST be set to "Full (Strict)"

# ==============================================================
# Production: affiliate-resources.superpatch.com (Cloudflare Full Strict)
# ==============================================================

# Cloudflare connects on 443 with origin certificate
server {
    listen 443 ssl;
    server_name affiliate-resources.superpatch.com;

    ssl_certificate /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# HTTP fallback — Cloudflare should always connect on 443,
# but redirect just in case
server {
    listen 80;
    server_name affiliate-resources.superpatch.com;
    return 301 https://$server_name$request_uri;
}
