# -*- Mode: Conf -*-
#
# Example nginx site configuration for the Media Management System.
# Replace media.example.com with your domain.
# Adjust SSL certificate paths, log paths, and IP allow lists.
#
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/.

server {
    listen 80 http2;
    server_name media.example.com;
    client_max_body_size 500M;
    return 301 https://$host$request_uri;
    access_log off;
    server_tokens off;
}

server {
    listen 443 ssl http2;
    server_name media.example.com;
    client_max_body_size 500M;

    access_log /var/log/nginx/media.access.log;
    error_log /var/log/nginx/media.error.log;

    add_header Content-Security-Policy "frame-ancestors 'self';";

    # Health check endpoints - restricted to internal networks only
    location ~ ^/(health|api/health) {
        # Adjust allow rules for your internal network
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        proxy_cache off;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_pass http://localhost:5001;  # Backend server (Docker port)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Debug endpoints - restricted to internal networks only
    location /api/debug {
        # Adjust allow rules for your internal network
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;

        proxy_cache off;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_pass http://localhost:5001;  # Backend server (Docker port)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Proxy API requests to backend server (port 5001)
    location /api {
        proxy_cache off;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_pass http://localhost:5001;  # Backend server (Docker port)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static file uploads from backend
    location /uploads {
        proxy_cache off;
        proxy_set_header Host $http_host;
        proxy_pass http://localhost:5001;  # Backend server serves uploads (Docker port)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else goes to frontend (port 5000)
    location / {
        proxy_cache off;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_pass http://localhost:5000;  # Frontend Next.js (Docker port)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Adjust SSL paths for your deployment
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.key;
    ssl_trusted_certificate /etc/nginx/ssl/fullchain.pem;
}
